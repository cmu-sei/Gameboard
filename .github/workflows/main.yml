name: CI

on:
  pull_request:
    branches:
      - main
  release:
    types: ["published"]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Use .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0
      - name: Install dependencies
        run: dotnet restore src
      - name: Build
        run: dotnet build src/Gameboard.Api.sln -c Release --no-restore
      - name: Run unit tests
        run: dotnet test src/Gameboard.Api.Tests.Unit -c Test --no-restore
      - name: Run integration tests
        run: dotnet test src/Gameboard.Api.Tests.Integration -c Test --no-restore

  build-and-publish:
    name: Build and Publish
    needs: test
    uses: cmu-sei/Crucible-Github-Actions/.github/workflows/docker-build.yaml@docker-v1
    with:
      imageName: cmusei/gameboard-api
      versionMode: csproj
      buildArgs: |
        commit=${{ github.sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
